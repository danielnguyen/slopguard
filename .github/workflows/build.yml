name: Build extensions

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build extension bundles
        run: npm run build

      - name: Package extension artifacts
        run: npm run package

      - name: Upload Chromium artifact
        uses: actions/upload-artifact@v4
        with:
          name: context-checker-chromium
          path: artifacts/chrome/context-checker-chromium.zip
          if-no-files-found: error

      - name: Upload Firefox unsigned XPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: context-checker-firefox-unsigned-xpi
          path: artifacts/firefox/context-checker-firefox-unsigned.xpi
          if-no-files-found: error
