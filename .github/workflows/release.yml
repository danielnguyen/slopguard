name: Release extensions

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and attach release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build extension bundles
        run: npm run build

      - name: Package extension artifacts
        run: npm run package

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/chrome/context-checker-chromium.zip
            artifacts/firefox/context-checker-firefox-unsigned.xpi
          generate_release_notes: true
          prerelease: true
